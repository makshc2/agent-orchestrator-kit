version: 1
kit_version: "{{KIT_VERSION}}"

project:
  name: "{{PROJECT_NAME}}"
  stack: node
  agent_language: "{{LANG}}"

package_manager: npm

pipeline:
  require_spec_review: true
  require_design_brief: false
  max_active_changes: 1
  archive_after_merge: true

roles:
  explorer:
    command: /opsx:explore
    mode: read-only
    model_hint: fast
  design_intake:
    command: /opsx:design
    mode: brief-only
    model_hint: strong
  architect:
    command: /opsx:propose
    mode: specs-only
    model_hint: strong
  spec_reviewer:
    command: /opsx:review
    mode: read-only
    model_hint: medium
  implementer:
    command: /opsx:apply
    mode: code
    model_hint: strong
    notes: "Use javascript-core, javascript-node, javascript-testing skills during apply"
  verifier:
    type: ci
    gates:
      - openspec-validate-strict
      - lint
      - build
      - test

handoff:
  explore_to_propose: decision_brief
  propose_to_review: validate_strict
  review_to_apply: explicit_approve
  apply_to_verify: all_tasks_checked

memory:
  enabled: true
  file: .cursor/memory.json

mcp:
  baseline:
    - memory
  optional:
    - figma

figma:
  env_file: .agents/figma.local.env
  token_key: FIGMA_ACCESS_TOKEN
  mcp_launcher: scripts/figma-mcp-launcher.cjs

verifier:
  lint_command: "npm run lint"
  build_command: "npm run build"
  test_command: "npm test"
