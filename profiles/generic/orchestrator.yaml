version: 1
kit_version: "{{KIT_VERSION}}"

project:
  name: "{{PROJECT_NAME}}"
  agent_language: "{{LANG}}"

pipeline:
  require_spec_review: true
  require_design_brief: false
  max_active_changes: 1
  archive_after_merge: true

roles:
  explorer:
    command: /opsx:explore
    mode: read-only
    model_hint: fast
  design_intake:
    command: /opsx:design
    mode: brief-only
    model_hint: strong
  architect:
    command: /opsx:propose
    mode: specs-only
    model_hint: strong
  spec_reviewer:
    command: /opsx:review
    mode: read-only
    model_hint: medium
  implementer:
    command: /opsx:apply
    mode: code
    model_hint: strong
  verifier:
    type: ci
    gates:
      - openspec-validate-strict
      - lint
      - build

handoff:
  explore_to_propose: decision_brief
  propose_to_review: validate_strict
  review_to_apply: explicit_approve
  apply_to_verify: all_tasks_checked

memory:
  enabled: true
  file: .cursor/memory.json

mcp:
  baseline:
    - memory

verifier:
  lint_command: ""
  build_command: ""
  test_command: ""
