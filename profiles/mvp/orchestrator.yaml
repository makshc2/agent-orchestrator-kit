version: 1
kit_version: "{{KIT_VERSION}}"

project:
  name: "{{PROJECT_NAME}}"
  profile: mvp
  stack: vue3
  agent_language: "{{LANG}}"

package_manager: npm

pipeline:
  require_spec_review: false
  require_design_brief: false
  max_active_changes: 3
  archive_after_merge: false
  quick_mode_enabled: true

roles:
  explorer:
    command: /opsx:explore
    mode: read-only
    model_hint: fast
  design_intake:
    command: /opsx:design
    mode: brief-only
    model_hint: strong
    notes: "In quick mode, the same session may create the brief before propose+apply"
  architect:
    command: /opsx:propose
    mode: specs-only
    model_hint: strong
  quick:
    command: /opsx:quick
    mode: specs-and-code
    model_hint: strong
    notes: "Propose + apply in one session for demos and spikes"
  implementer:
    command: /opsx:apply
    mode: code
    model_hint: strong
  spec_reviewer:
    enabled: false
  verifier:
    type: local
    gates:
      - lint
      - build

handoff:
  explore_to_propose: decision_brief
  propose_to_apply: validate_or_quick
  apply_to_verify: all_tasks_checked

memory:
  enabled: true
  file: .cursor/memory.json

mcp:
  baseline:
    - memory

verifier:
  lint_command: "npm run lint"
  build_command: "npm run build"
  test_command: ""
