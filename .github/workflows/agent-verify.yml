name: agent-verify

on:
  pull_request:
  push:
    branches: [main, master, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: OpenSpec validate
        run: npx openspec validate --all --strict

      - name: Test
        run: npm test
